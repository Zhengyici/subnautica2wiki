<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="keywords" content="{{ .Site.Params.keywords }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <nav class="navbar">
    <a href="{{ "/" | relURL }}" class="logo">
      <span class="logo-icon">🌊</span>
      Subnautica 2 Wiki
    </a>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <div class="nav-spacer"></div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search creatures, materials, recipes..." autocomplete="off">
      <div id="search-results"></div>
    </div>
  </nav>
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="footer">
    <p>Subnautica 2 Wiki & Database — Fan-made wiki for Subnautica 2. Not affiliated with Unknown Worlds Entertainment.</p>
    <p>Data sourced from community research and in-game test
