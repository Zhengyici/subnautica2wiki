<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="keywords" content="{{ .Site.Params.keywords }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <nav class="navbar">
    <a href="{{ "/" | relLangURL }}" class="logo">
      <span class="logo-icon">&#x1F30A;</span>
      {{ .Site.Title }}
    </a>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
    <div class="nav-spacer"></div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="{{ i18n "search_placeholder" }}" autocomplete="off">
      <div id="search-results"></div>
    </div>
    <div class="lang-switcher">
      {{ range .Translations }}
        <a href="{{ .Permalink }}" class="lang-btn">{{ .Language.Label }}</a>
      {{ end }}
      <a href="{{ .Permalink }}" class="lang-btn lang-active">{{ .Site.Language.Label }}</a>
    </div>
  </nav>
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="footer">
    <p>{{ i18n "footer_text" }}</p>
    <p>{{ i18n "footer_source" }} <a href="https://store.steampowered.com/app/1962700/Subnautica_2/">Steam</a></p>
  </footer>
  <script src="{{ "js/search.js" | relURL }}"></script>
</body>
</html>
